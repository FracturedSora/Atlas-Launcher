name: Build Multi-Platform
on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ${{ matrix.os }}
    environment: production

    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Check out git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Create .env file
        shell: bash
        run: |
          echo "ANILIST_CLIENT_ID=${{ secrets.ANILIST_CLIENT_ID }}" >> .env
          echo "ANILIST_CLIENT_SECRET=${{ secrets.ANILIST_CLIENT_SECRET }}" >> .env
          echo "PORT=${{ secrets.PORT }}" >> .env

      - name: Build Electron App
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANILIST_CLIENT_ID: ${{ secrets.ANILIST_CLIENT_ID }}
          ANILIST_CLIENT_SECRET: ${{ secrets.ANILIST_CLIENT_SECRET }}
          PORT: ${{ secrets.PORT }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Atlas-Launcher-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.AppImage
            dist/*.dmg
            dist/*.zip
            dist/*.blockmap

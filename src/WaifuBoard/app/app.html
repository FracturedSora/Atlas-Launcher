<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests" />
        <title>Atlas Launcher | WaifuBoard</title>
        <!-- Preconnect so the font request starts before the CSS parser hits @import -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link rel="stylesheet" href="app.css" />
        <!--
          Nexus registry — must run synchronously before any extension script,
          so it stays in <head> (not deferred). Kept minimal.
        -->
        <script>
            window.Nexus = {
                extensions: [],
                register(scraperClass) {
                    const inst = new scraperClass();
                    this.extensions.push({
                        className: scraperClass.name,
                        classRef:  scraperClass,
                        name:      inst.name  || scraperClass.name,
                        icon:      inst.logo  || inst.icon || "",
                        type:      inst.type  || "sfw",
                    });
                    if (window.initSourcePicker) window.initSourcePicker();
                },
            };
        </script>
    </head>
    <body>
        <header>
            <div class="search-container">
                <input
                    type="text"
                    class="search-input"
                    placeholder="Search tags, artists, characters..."
                    autocomplete="off"
                    spellcheck="false"
                />
            </div>
            <div class="source-picker">
                <div id="active-source-display" class="source-icon-circle">
                    <img id="current-source-icon" src="" alt="" style="display:none" />
                </div>
                <div id="source-dropdown" class="dropdown-content"></div>
            </div>
        </header>

        <div class="wrapper">
            <aside>
                <div class="sidebar-section">
                    <div class="sidebar-title">Trending</div>
                </div>
            </aside>
            <main></main>
        </div>

        <div id="nexus-modal" class="modal">
            <div class="modal-content">
                <span class="close-modal">&times;</span>
                <div class="modal-body">
                    <div class="modal-viewport">
                        <img id="modal-img" src="" alt="Full Resolution" />
                    </div>
                    <div class="modal-panel">
                        <div class="panel-section">
                            <h3>Tags</h3>
                            <div id="modal-tags" class="tag-cloud"></div>
                        </div>
                        <div class="panel-section">
                            <h3>Comments</h3>
                            <div id="modal-comments" class="comment-feed"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!--
          Extensions load synchronously so Nexus.register fires in order.
          app.js is last — by then all scrapers are registered.
        -->
        <script src="extensions/gelbooru.js"></script>
        <script src="extensions/realbooru.js"></script>
        <script src="extensions/waifupics.js"></script>
        <script src="extensions/waifupicsnsfw.js"></script>
        <script src="extensions/r34.js"></script>
        <script src="app.js"></script>
    </body>
</html>

<!doctype html>
<html lang="en">
    <head>
        <title>Atlas Launcher | WaifuBoard</title>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="../styles/app.css" />
        <script src="../scripts/sidebar.js"></script>
    </head>
    <body>
        <div id="sidebar"></div>
        <div class="app-container">
            <img
                src="../../public/banners/waifuboard.png"
                class="background-img"
            />
            <p id="status" style="color:#aaa;font-size:0.8rem;margin-bottom:10px;"></p>
            <button
                id="launch-btn"
                class="download"
                data-url="http://localhost:3003"
                disabled
            >
                Checking...
            </button>
        </div>

        <script>
            const btn    = document.getElementById("launch-btn");
            const status = document.getElementById("status");
            btn.textContent = "Launch WaifuBoard";
            btn.disabled = false;

            const mode = localStorage.getItem("contentType") || "sfw";
            btn.setAttribute("data-url", `http://localhost:3003?mode=${mode}`);

            btn.onclick = null;
        </script>
        <script src="../scripts/launchapp.js"></script>
    </body>
</html>

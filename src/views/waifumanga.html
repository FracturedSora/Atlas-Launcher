<!doctype html>
<html lang="en">
    <head>
        <title>Atlas Launcher | WaifuManga</title>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="../styles/app.css" />
        <script src="../scripts/sidebar.js"></script>
    </head>
    <body>
        <div id="sidebar"></div>
        <div class="app-container">
            <img src="../../public/banners/waifumanga.png" class="background-img" />
            <p id="status" style="color:#aaa;font-size:0.8rem;margin-bottom:10px;"></p>
            <button
                id="launch-btn"
                class="download"
                data-url="http://localhost:3001"
                disabled
            >
                Checking...
            </button>
        </div>

        <script>
            const APP_ID      = "waifumanga";
            const GITHUB_REPO = "FracturedSora/WaifuStuff";
            const PORT        = 3001;

            const btn    = document.getElementById("launch-btn");
            const status = document.getElementById("status");

            async function init() {
                const installed = await window.backendAPI.isInstalled(APP_ID);

                if (!installed) {
                    btn.textContent = "Download & Launch";
                    btn.disabled = false;
                    btn.onclick = installThenLaunch;
                    return;
                }
                await startServer();
            }

            async function installThenLaunch() {
                btn.disabled = true;
                btn.textContent = "Downloading...";

                const result = await window.backendAPI.install(APP_ID, GITHUB_REPO);
                if (!result.success) {
                    btn.textContent = "Retry";
                    btn.disabled = false;
                    btn.onclick = installThenLaunch;
                    return;
                }
                await startServer();
            }

            async function startServer() {
                btn.disabled = true;
                btn.textContent = "Starting...";

                const result = await window.backendAPI.launch(APP_ID, PORT);
                if (!result.success) {
                    btn.textContent = "Retry";
                    btn.disabled = false;
                    btn.onclick = startServer;
                    return;
                }

                btn.textContent = "Launch WaifuManga";
                btn.disabled = false;
            }

            init();
        </script>

        <script src="../scripts/launchapp.js"></script>
    </body>
</html>
